<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Inscripción</title>

    <!-- Enlace al CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>📋 Formulario de Inscripción</h1>

        <div class="success-message">
            ¡Inscripción realizada con éxito!
        </div>

        <form>

            <div class="form-row">
                <div class="form-group">
                    <label>Tipo de Documento *</label>
                    <select required>
                        <option value="">Seleccionar...</option>
                        <option>CC</option>
                        <option>CE</option>
                        <option>Pasaporte</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Número de Documento *</label>
                    <input type="text" placeholder="1234567890" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Nombres *</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Apellidos *</label>
                    <input type="text" required>
                </div>
            </div>

            <div class="form-group">
                <label>Dirección *</label>
                <input type="text" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Teléfono *</label>
                    <input type="tel" required>
                </div>

                <div class="form-group">
                    <label>Celular *</label>
                    <input type="tel" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" required>
            </div>

            <div class="form-group">
                <label>Usuario *</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Contraseña *</label>
                <input type="password" required>
            </div>

            <div class="form-group">
                <label>Fecha *</label>
                <input type="date" required>
            </div>

            <div class="form-group">
                <label>Hobbies</label>

                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox"> Deporte</label>
                    <label class="checkbox-item"><input type="checkbox"> Música</label>
                    <label class="checkbox-item"><input type="checkbox"> Viajes</label>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Enviar</button>
                <button type="reset" class="btn-reset">Limpiar</button>
            </div>

        </form>
    </div>
</body>
</html>
